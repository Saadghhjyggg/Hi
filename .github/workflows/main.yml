name: Hysteria-Turbo-Stable
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install & Run
        run: |
          # تثبيت الأدوات
          sudo wget -q https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64 -O /usr/local/bin/hysteria
          sudo chmod +x /usr/local/bin/hysteria
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          sudo chmod +x cloudflared
          
          # إعداد السيرفر
          cat <<EOF > config.yaml
          listen: :54321
          auth:
            type: password
            password: saad_turbo_pass
          tls:
            cert: selfsigned
            key: selfsigned
          EOF
          
          # تشغيل السيرفر
          ./hysteria server -c config.yaml > server.log 2>&1 &
          
          # تشغيل النفق مع منع الإغلاق
          ./cloudflared tunnel --url http://localhost:54321 --no-autoupdate
