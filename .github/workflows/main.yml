name: Hysteria-Turbo-V2
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Hysteria & Cloudflare
        run: |
          sudo wget -q https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64 -O /usr/local/bin/hysteria
          sudo chmod +x /usr/local/bin/hysteria
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          
      - name: Run Server
        run: |
          # إنشاء ملف الإعدادات بتنسيق YAML صحيح ومضمون
          cat <<EOF > config.yaml
          listen: :54321
          auth:
            type: password
            password: saad_turbo_pass
          tls:
            cert: selfsigned
            key: selfsigned
          EOF
          
          # تشغيل السيرفر في الخلفية
          hysteria server -c config.yaml &
          
          # تشغيل النفق (استخدام http للتحويل الداخلي يحل مشكلة الـ UDP)
          cloudflared tunnel --url http://localhost:54321
