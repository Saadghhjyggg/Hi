name: Saad-VLESS-Final
on: 
  workflow_dispatch:
jobs:
  run-vless:
    runs-on: ubuntu-latest
    steps:
      - name: Start VLESS Server
        run: |
          # تحميل نسخة جاهزة من Xray بلا تثبيت
          wget https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip Xray-linux-64.zip
          
          # إعداد السيرفر وسط المجلد الحالي
          cat <<EOF > config.json
          {
            "inbounds": [{
              "port": 8080,
              "protocol": "vless",
              "settings": {
                "clients": [{"id": "saad-1122-3344-5566-778899aabbcc"}],
                "decryption": "none"
              },
              "streamSettings": {
                "network": "ws",
                "wsSettings": {"path": "/saad-turbo"}
              }
            }],
            "outbounds": [{"protocol": "freedom"}]
          }
          EOF
          
          # تشغيل السيرفر والنفق
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cf && chmod +x cf
          ./xray run -c config.json &
          ./cf tunnel --url http://localhost:8080
