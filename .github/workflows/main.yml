name: Hysteria-Force-Turbo
on: 
  workflow_dispatch:
jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Network & Run
        run: |
          # إصلاح الـ DNS في سيرفر GitHub
          sudo echo "nameserver 8.8.8.8" > /etc/resolv.conf
          
          # تحميل الهستيريا
          sudo wget -q https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64 -O /usr/local/bin/hy2
          sudo chmod +x /usr/local/bin/hy2
          
          # إنشاء الإعدادات (تأكد من الباسورد)
          cat <<EOF > config.yaml
          listen: :443
          auth: { type: "password", password: "saad_turbo_pass" }
          tls: { cert: "selfsigned", key: "selfsigned" }
          obfs: { type: "salamander", salamander: { password: "saad_obfs_pass" } }
          EOF
          
          # تشغيل النفق
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cf && chmod +x cf
          ./hy2 server -c config.yaml &
          ./cf tunnel --url http://localhost:443
