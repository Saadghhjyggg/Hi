name: Hysteria-Turbo-V2
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: |
          # تحميل وتثبيت Hysteria
          sudo wget -q https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64 -O /usr/local/bin/hysteria
          sudo chmod +x /usr/local/bin/hysteria
          
          # تحميل وتثبيت Cloudflared مباشرة
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          sudo chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Run Server
        run: |
          # إنشاء ملف الإعدادات
          cat <<EOF > config.yaml
          listen: :54321
          auth:
            type: password
            password: saad_turbo_pass
          tls:
            cert: selfsigned
            key: selfsigned
          EOF
          
          # تشغيل السيرفر في الخلفية
          hysteria server -c config.yaml &
          
          # تشغيل النفق وإظهار الرابط
          cloudflared tunnel --url http://localhost:54321
